            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">

            if (userStats[verb] && userStats[verb].total > 0) {
                let percentage = Math.round((userStats[verb].correct / userStats[verb].total) * 100);
                statText = `<span class="text-xs ml-auto font-bold text-emerald-500">${percentage}%</span>`;
            }

            const label = document.createElement('label');
            label.className = 'flex items-center gap-2 p-2.5 bg-gray-50 dark:bg-gray-800/50 rounded-lg border border-gray-200 dark:border-gray-850 cursor-pointer hover:border-blue-400 dark:hover:border-blue-500 transition text-sm';
            label.innerHTML = `
                <input type="checkbox" value="${verb}" class="verb-cb w-4 h-4 text-blue-600 rounded border-gray-300" checked>
                <span class="font-medium">${verb}</span>
                ${statText}
            `;
            container.appendChild(label);
        });

        // Theme / Dark Mode Handler
        const savedTheme = localStorage.getItem('dd8_theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // Event Listener für Eingabefelder
        document.getElementById('answer-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('check-btn').style.display !== 'none') {
                    checkAnswer();
                } else {
                    nextQuestion();
                }
            }
        });

        lucide.createIcons();
    }

    // Dark-Mode Toggle
    document.getElementById('theme-toggle').addEventListener('click', () => {
        const isDark = document.documentElement.classList.contains('dark');
        if (isDark) {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('dd8_theme', 'light');
        } else {
            document.documentElement.classList.add('dark');
            localStorage.setItem('dd8_theme', 'dark');
        }
    });

    function toggleAllVerbs(state) {
        document.querySelectorAll('.verb-cb').forEach(cb => cb.checked = state);
    }

    function startPractice() {
        selectedVerbs = Array.from(document.querySelectorAll('.verb-cb:checked')).map(cb => cb.value);
        selectedTenses = Array.from(document.querySelectorAll('.tense-cb:checked')).map(cb => cb.value);

        if (selectedVerbs.length === 0 || selectedTenses.length === 0) {
            alert("Bitte wähle mindestens ein Verb und eine Zeit aus, um zu üben!");
            return;
        }

        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('practice-view').classList.remove('hidden');
        
        sessionCorrect = 0;
        sessionTotal = 0;
        updateStatsUI();
        nextQuestion();
    }

    function backToSetup() {
        document.getElementById('setup-view').classList.remove('hidden');
        document.getElementById('practice-view').classList.add('hidden');
        init();
    }

    function nextQuestion() {
        const selectedVerb = selectedVerbs[Math.floor(Math.random() * selectedVerbs.length)];
        const selectedTense = selectedTenses[Math.floor(Math.random() * selectedTenses.length)];
        const pronounIndex = Math.floor(Math.random() * 6);

        // Bestimme das Pronomen für die Anzeige
        let displayPronoun = displayPronouns[pronounIndex];
        
        // Elisionsregel für Je / J' anwenden
        if (pronounIndex === 0) {
            const fullAnswer = verbData[selectedVerb][selectedTense][0];
            if (fullAnswer.startsWith("j'")) {
                displayPronoun = "J'";
            } else {
                displayPronoun = "Je";
            }
        }

        // Hole die exakte, realistische Antwort direkt aus der Matrix
        const answerRaw = verbData[selectedVerb][selectedTense][pronounIndex];

        currentQuestion = {
            verb: selectedVerb,
            tense: selectedTense,
            pronounIndex: pronounIndex,
            displayPronoun: displayPronoun,
            correctAnswer: answerRaw
        };

        document.getElementById('q-verb').innerText = selectedVerb;
        document.getElementById('q-meaning').innerText = `(${verbData[selectedVerb].translation})`;
        document.getElementById('q-tense').innerText = selectedTense;
        document.getElementById('q-pronoun').innerText = displayPronoun;
        
        const inputField = document.getElementById('answer-input');
        inputField.value = '';
        inputField.disabled = false;
        
        // Fokus auf das Eingabefeld setzen
        setTimeout(() => inputField.focus(), 50);

        document.getElementById('feedback-box').className = 'mt-6 p-4 rounded-lg hidden';
        document.getElementById('check-btn').classList.remove('hidden');
        document.getElementById('next-btn').classList.add('hidden');
    }

    // Normalisiert Text, um Tippfehler bei mehrfachen Leerzeichen oder ungleicher Gross-/Kleinschreibung zu verzeihen
    function cleanText(str) {
        return str.toLowerCase().trim().replace(/\s+/g, ' ').replace(/[’']/g, "'");
    }

    function checkAnswer() {
        const inputField = document.getElementById('answer-input');
        let userAns = cleanText(inputField.value);
        let correctAns = cleanText(currentQuestion.correctAnswer);

        // Verhindert leere Eingaben
        if (!userAns) return;

        sessionTotal++;
        
        if (!userStats[currentQuestion.verb]) {
            userStats[currentQuestion.verb] = { correct: 0, total: 0 };
        }
        userStats[currentQuestion.verb].total++;

        const feedbackBox = document.getElementById('feedback-box');
        feedbackBox.classList.remove('hidden');

        // Prüfen, ob die Antwort passt
        if (userAns === correctAns) {
            sessionCorrect++;
            userStats[currentQuestion.verb].correct++;
            
            feedbackBox.innerHTML = `
                <div class="flex items-start gap-3">
                    <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-500 mt-0.5 shrink-0"></i>
                    <div>
                        <p class="font-bold text-emerald-800 dark:text-emerald-400">Hervorragend!</p>
                        <p class="text-sm text-emerald-700/90 dark:text-emerald-300/90 mt-0.5">"${currentQuestion.correctAnswer}" ist absolut fehlerfrei.</p>
                    </div>
                </div>
            `;
            feedbackBox.className = 'mt-6 p-4 rounded-xl bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-200 dark:border-emerald-900/40 transition duration-200';
        } else {
            feedbackBox.innerHTML = `
                <div class="flex items-start gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5 text-rose-500 mt-0.5 shrink-0"></i>
                    <div>
                        <p class="font-bold text-rose-800 dark:text-rose-400">Leider nicht ganz richtig</p>
                        <p class="text-sm text-rose-700/90 dark:text-rose-300/90 mt-1">
                            Eingegeben: <span class="line-through opacity-70">${inputField.value}</span>
                        </p>
                        <p class="text-sm font-semibold text-rose-800 dark:text-rose-300 mt-1.5">
                            Richtig: <span class="underline decoration-2 underline-offset-2">${currentQuestion.correctAnswer}</span>
                        </p>
                    </div>
                </div>
            `;
            feedbackBox.className = 'mt-6 p-4 rounded-xl bg-rose-50 dark:bg-rose-950/40 border border-rose-200 dark:border-rose-900/40 transition duration-200';
        }

        // Statistiken persistent im Browser sichern
        localStorage.setItem('dd8_verb_stats_v2', JSON.stringify(userStats));
        updateStatsUI();
        lucide.createIcons();

        inputField.disabled = true;
        document.getElementById('check-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
        document.getElementById('next-btn').focus();
    }

    function updateStatsUI() {
        document.getElementById('session-stats').innerText = `Richtig: ${sessionCorrect} / ${sessionTotal}`;
    }

    // Applikation starten
    init();
</script>

</body>
</html>
